<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Road Rush Jr. 🚗</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; }

    /* ── Auth overlay ─────────────────────────────────────────────────────── */
    #authOverlay {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 10;
    }
    #authOverlay.visible { display: flex; }

    #authTabs { display: flex; gap: 0; margin-bottom: 4px; }
    .auth-tab {
      padding: 10px 32px; font-size: 15px; font-weight: bold; cursor: pointer;
      background: #2a2a4e; color: #aaa; border: 2px solid #3a3a6e;
      transition: background 0.15s, color 0.15s;
    }
    .auth-tab:first-child { border-radius: 8px 0 0 8px; }
    .auth-tab:last-child  { border-radius: 0 8px 8px 0; }
    .auth-tab.active { background: #f59e0b; color: #1a1a2e; border-color: #f59e0b; }

    .auth-input {
      width: 280px; padding: 13px 16px; font-size: 16px;
      background: #2a2a4e; color: #fff; border: 2px solid #3a3a6e;
      border-radius: 8px; outline: none; transition: border-color 0.15s;
    }
    .auth-input:focus { border-color: #f59e0b; }
    .auth-input::placeholder { color: #666; }

    .auth-btn {
      width: 280px; padding: 14px; font-size: 17px; font-weight: bold;
      background: #f59e0b; color: #1a1a2e; border: none; border-radius: 8px;
      cursor: pointer; transition: opacity 0.15s;
    }
    .auth-btn:disabled { opacity: 0.5; cursor: default; }

    #authError {
      color: #ff6b6b; font-size: 13px; min-height: 18px;
      font-family: sans-serif; text-align: center; max-width: 280px;
    }

    .auth-guest {
      background: none; border: none; color: #888; font-size: 13px;
      cursor: pointer; text-decoration: underline; padding: 4px;
      font-family: sans-serif;
    }
    .auth-guest:hover { color: #bbb; }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="authOverlay">
  <div id="authTabs">
    <button class="auth-tab active" id="tabLogin">Log In</button>
    <button class="auth-tab"        id="tabSignup">Sign Up</button>
  </div>
  <input class="auth-input" id="authEmail" type="email"    placeholder="Email" autocomplete="email" />
  <input class="auth-input" id="authName"  type="text"     placeholder="Username (min 3 chars)" autocomplete="username" style="display:none" />
  <input class="auth-input" id="authPass"  type="password" placeholder="Password (min 6 chars)" autocomplete="current-password" />
  <button class="auth-btn"  id="authSubmit">Log In</button>
  <div id="authError"></div>
  <button class="auth-guest" id="authGuest">Play as guest →</button>
</div>

<script>
'use strict';

// ─── Supabase client ──────────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://wfatoxcygbtjbqtrhkbz.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmYXRveGN5Z2J0amJxdHJoa2J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MjM0MTksImV4cCI6MjA5NDA5OTQxOX0.iqJoU6hWoeub7WfYqAgKIQNc4kbAlJPgMjEfPQlZBBY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let currentUser = null; // { id, email, username } — null means guest

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const GAME_W = 480;
const GAME_H = 720;

function resizeCanvas() {
  const scale = Math.min(window.innerWidth / GAME_W, window.innerHeight / GAME_H);
  canvas.style.width  = Math.floor(GAME_W * scale) + 'px';
  canvas.style.height = Math.floor(GAME_H * scale) + 'px';
  canvas.width  = GAME_W;
  canvas.height = GAME_H;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ─── Audio system ─────────────────────────────────────────────────────────────
let audioCtx  = null;
let muted     = false;
let engineOsc = null;   // looping engine hum oscillator
let engineGain = null;  // gain node for engine hum

function ensureAudio() {
  if (audioCtx) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return;
  }
  audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
  engineGain = audioCtx.createGain();
  engineGain.gain.value = 0;
  engineGain.connect(audioCtx.destination);

  engineOsc = audioCtx.createOscillator();
  engineOsc.type = 'sine';
  engineOsc.frequency.value = 82;
  engineOsc.connect(engineGain);
  engineOsc.start();
}

// Play a one-shot tone: frequency can be a number (constant) or [f0,f1] (sweep)
function playTone(freq, duration, type = 'sine', peakGain = 0.3, startDelay = 0) {
  if (muted || !audioCtx) return;
  const t    = audioCtx.currentTime + startDelay;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  if (Array.isArray(freq)) {
    osc.frequency.setValueAtTime(freq[0], t);
    osc.frequency.linearRampToValueAtTime(freq[1], t + duration);
  } else {
    osc.frequency.setValueAtTime(freq, t);
  }
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(peakGain, t + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + duration + 0.05);
}

function sndStar() {
  // Ascending chime: C5 → E5 → G5 (triangle, gentle)
  playTone(523, 0.12, 'triangle', 0.25, 0.00);
  playTone(659, 0.12, 'triangle', 0.25, 0.09);
  playTone(784, 0.18, 'triangle', 0.30, 0.18);
}

function sndHit() {
  // Descending boing: 220 → 90 Hz over 300ms
  playTone([220, 90], 0.30, 'sine', 0.40);
}

function sndTierUp() {
  // 3-note ascending fanfare
  playTone(523, 0.15, 'square', 0.18, 0.00);
  playTone(659, 0.15, 'square', 0.18, 0.14);
  playTone(880, 0.25, 'square', 0.22, 0.28);
}

function sndGameOver() {
  // Descending wah-wah: 440 → 180 Hz
  playTone([440, 220], 0.30, 'sawtooth', 0.20, 0.00);
  playTone([220, 180], 0.40, 'sawtooth', 0.15, 0.28);
}

function updateEngine(dt) {
  if (!audioCtx || !engineGain) return;
  if (muted || gameState !== STATE.PLAYING) {
    engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
    return;
  }
  // Pitch tracks road speed (80–130 Hz)
  const targetFreq = 80 + (roadSpeed / TIER_SPEED[3]) * 50;
  engineOsc.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.3);
  // Subtle volume
  engineGain.gain.setTargetAtTime(0.04, audioCtx.currentTime, 0.2);
}

// ─── State machine ────────────────────────────────────────────────────────────
const STATE = { AUTH: 'AUTH', START: 'START', PLAYING: 'PLAYING', GAME_OVER: 'GAME_OVER' };
let gameState = STATE.AUTH;
function setState(s) { gameState = s; }

// ─── Auth screen logic ────────────────────────────────────────────────────────
let authMode = 'login';

const authOverlay = document.getElementById('authOverlay');
const tabLogin    = document.getElementById('tabLogin');
const tabSignup   = document.getElementById('tabSignup');
const authEmail   = document.getElementById('authEmail');
const authName    = document.getElementById('authName');
const authPass    = document.getElementById('authPass');
const authSubmit  = document.getElementById('authSubmit');
const authError   = document.getElementById('authError');
const authGuest   = document.getElementById('authGuest');

function showAuthForm() {
  authOverlay.classList.add('visible');
  authError.textContent = '';
  authEmail.value = authPass.value = authName.value = '';
  setAuthMode('login');
}

function hideAuthForm() {
  authOverlay.classList.remove('visible');
}

function setAuthMode(mode) {
  authMode = mode;
  const isSignup = mode === 'signup';
  tabLogin.classList.toggle('active',  !isSignup);
  tabSignup.classList.toggle('active',  isSignup);
  authName.style.display    = isSignup ? 'block' : 'none';
  authSubmit.textContent    = isSignup ? 'Sign Up' : 'Log In';
  authError.textContent     = '';
}

async function handleAuthSubmit() {
  const email = authEmail.value.trim();
  const pass  = authPass.value;
  const name  = authName.value.trim();
  authError.textContent  = '';
  authSubmit.disabled    = true;
  authSubmit.textContent = '…';

  try {
    if (authMode === 'login') {
      const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) throw error;
      const { data: profile } = await sb.from('profiles').select('username').eq('id', data.user.id).single();
      currentUser = { id: data.user.id, email: data.user.email, username: profile?.username ?? email };
    } else {
      if (name.length < 3) throw new Error('Username must be at least 3 characters.');
      const { data, error } = await sb.auth.signUp({ email, password: pass });
      if (error) throw error;
      await sb.from('profiles').insert({ id: data.user.id, username: name });
      currentUser = { id: data.user.id, email: data.user.email, username: name };
    }
    hideAuthForm();
    setState(STATE.START);
  } catch (err) {
    authError.textContent = err.message;
  } finally {
    authSubmit.disabled    = false;
    authSubmit.textContent = authMode === 'login' ? 'Log In' : 'Sign Up';
  }
}

tabLogin.addEventListener('click',  () => setAuthMode('login'));
tabSignup.addEventListener('click', () => setAuthMode('signup'));
authSubmit.addEventListener('click', handleAuthSubmit);
authPass.addEventListener('keydown', e => { if (e.key === 'Enter') handleAuthSubmit(); });
authGuest.addEventListener('click', () => { currentUser = null; hideAuthForm(); setState(STATE.START); });

// ─── Session persistence & logout ─────────────────────────────────────────────
sb.auth.onAuthStateChange((event) => {
  if (event === 'SIGNED_OUT') { currentUser = null; }
});

async function logout() {
  await sb.auth.signOut();
  currentUser = null;
  setState(STATE.AUTH);
  showAuthForm();
}

// Logout button hit area (game coords) — bottom-centre of START / GAME_OVER screens
const LOUT_X1 = GAME_W / 2 - 60, LOUT_X2 = GAME_W / 2 + 60;
const LOUT_Y1 = GAME_H - 54,     LOUT_Y2 = GAME_H - 26;

function drawLogoutBtn() {
  if (!currentUser) return;
  ctx.textAlign   = 'center';
  ctx.fillStyle   = 'rgba(255,255,255,0.28)';
  ctx.font        = '13px sans-serif';
  ctx.fillText('Log out', GAME_W / 2, LOUT_Y2);
  ctx.textAlign   = 'left';
}

// ─── Input ────────────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  ensureAudio();
  keys[e.code] = true;
  if (gameState === STATE.START     && (e.code === 'Space' || e.code === 'Enter')) startGame();
  if (gameState === STATE.GAME_OVER && (e.code === 'Space' || e.code === 'Enter')) startGame();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
canvas.addEventListener('click', e => {
  ensureAudio();
  const rect  = canvas.getBoundingClientRect();
  const gx    = (e.clientX - rect.left)  * (GAME_W / rect.width);
  const gy    = (e.clientY - rect.top)   * (GAME_H / rect.height);
  // Mute toggle (top-right, all states)
  if (gx >= GAME_W - 44 && gx <= GAME_W - 4 && gy >= 4 && gy <= 44) {
    muted = !muted;
    if (engineGain) engineGain.gain.setTargetAtTime(muted ? 0 : 0.04, audioCtx.currentTime, 0.1);
    return;
  }
  if (gameState === STATE.START     && gx >= 140 && gx <= 340 && gy >= 430 && gy <= 488) startGame();
  if (gameState === STATE.GAME_OVER && gx >= 130 && gx <= 350 && gy >= 420 && gy <= 478) startGame();
  // Logout button (START and GAME_OVER, logged-in users only)
  if (currentUser && (gameState === STATE.START || gameState === STATE.GAME_OVER)) {
    if (gx >= LOUT_X1 && gx <= LOUT_X2 && gy >= LOUT_Y1 && gy <= LOUT_Y2) { logout(); return; }
  }
});
function isLeft()  { return keys['ArrowLeft']  || keys['KeyA'] || touchLeft; }
function isRight() { return keys['ArrowRight'] || keys['KeyD'] || touchRight; }

// ─── Touch / on-screen button controls ───────────────────────────────────────
let touchLeft  = false;
let touchRight = false;

// Button geometry (game coordinates) — drawn at bottom of canvas
const BTN_Y = GAME_H - 100;
const BTN_H = 80;
const BTN_L_X1 = 10,  BTN_L_X2 = 150;   // LEFT button
const BTN_R_X1 = 330, BTN_R_X2 = 470;   // RIGHT button

function inLeftBtn(gx, gy)  { return gx >= BTN_L_X1 && gx <= BTN_L_X2 && gy >= BTN_Y && gy <= BTN_Y + BTN_H; }
function inRightBtn(gx, gy) { return gx >= BTN_R_X1 && gx <= BTN_R_X2 && gy >= BTN_Y && gy <= BTN_Y + BTN_H; }

function canvasCoords(e, touch) {
  const rect = canvas.getBoundingClientRect();
  const src  = touch || e;
  return {
    gx: (src.clientX - rect.left)  * (GAME_W / rect.width),
    gy: (src.clientY - rect.top)   * (GAME_H / rect.height),
  };
}

canvas.addEventListener('touchstart', e => {
  ensureAudio();
  e.preventDefault();
  touchLeft = false; touchRight = false;
  for (const t of e.touches) {
    const { gx, gy } = canvasCoords(e, t);
    if (inLeftBtn(gx, gy))  touchLeft  = true;
    if (inRightBtn(gx, gy)) touchRight = true;
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  touchLeft = false; touchRight = false;
  for (const t of e.touches) {
    const { gx, gy } = canvasCoords(e, t);
    if (inLeftBtn(gx, gy))  touchLeft  = true;
    if (inRightBtn(gx, gy)) touchRight = true;
  }
}, { passive: false });

canvas.addEventListener('touchend',    () => { touchLeft = false; touchRight = false; });
canvas.addEventListener('touchcancel', () => { touchLeft = false; touchRight = false; });

// Mouse equivalents (for desktop testing of touch areas)
canvas.addEventListener('mousedown', e => {
  const { gx, gy } = canvasCoords(e);
  if (inLeftBtn(gx, gy))  touchLeft  = true;
  if (inRightBtn(gx, gy)) touchRight = true;
});
canvas.addEventListener('mouseup',   () => { touchLeft = false; touchRight = false; });

// ─── Road constants ───────────────────────────────────────────────────────────
const ROAD_L    = 80;           // left edge of asphalt
const ROAD_R    = 400;          // right edge of asphalt
const ROAD_W    = ROAD_R - ROAD_L;
const LANE_W    = ROAD_W / 3;  // 3 lanes
// Lane centre X positions
const LANES     = [ROAD_L + LANE_W * 0.5, ROAD_L + LANE_W * 1.5, ROAD_L + LANE_W * 2.5];

// Difficulty tiers — speed in px/s
const TIER_SPEED    = [0, 220, 330, 460];
const TIER_ELAPSED  = [0,   0,  30,  60]; // seconds at which each tier starts
const TIER_LABELS   = ['', '', '🟡 Getting Faster! 🚀', '🔴 Zoom Zoom! 🚀'];
let tier      = 1;
let roadSpeed = TIER_SPEED[tier];

// Tier announcement banner: { text, age, maxAge }
let tierBanner = null;

// Scroll offsets (wrap at GAME_H)
let roadY = 0;      // lane markings offset
let treeY = 0;      // parallax trees (slower)

// ─── Player car ───────────────────────────────────────────────────────────────
const CAR_W     = 44;          // visible width
const CAR_H     = 72;          // visible height
const HIT_W     = CAR_W * 0.70; // forgiving hitbox (~70%)
const HIT_H     = CAR_H * 0.70;
const CAR_SPEED = 280;         // px/s lateral
const CAR_Y     = GAME_H - 140; // fixed vertical position (near bottom)

const player = {
  x:     GAME_W / 2,   // centre X
  vx:    0,            // lateral velocity (used for tilt)
  tilt:  0,            // visual lean angle in radians
  color: '#FF3B3B',    // bright red
};

// ─── Obstacles ────────────────────────────────────────────────────────────────
// Each obstacle: { type: 'car'|'cone', lane: 0-2, y, color, w, h }
const OBS_CAR_W  = 44, OBS_CAR_H  = 68;
const OBS_CONE_W = 28, OBS_CONE_H = 36;
const OBS_COLORS = ['#4FC3F7', '#81C784', '#FFD54F', '#CE93D8', '#FF8A65'];

let obstacles    = [];
let spawnTimer   = 0;   // counts up to next spawn
let invincible   = 0;   // invincibility frames (seconds)
const INV_TIME   = 1.8; // seconds of invincibility after a hit

// Spawn interval per tier (seconds between waves)
const SPAWN_INTERVAL = [0, 1.8, 1.4, 1.0];

// ─── Stars ────────────────────────────────────────────────────────────────────
// Each star: { x, y }
let stars          = [];
let starSpawnTimer = 0;
let starNextSpawn  = 4 + Math.random() * 2;  // first spawn at 4–6 s
const STAR_R       = 18;    // outer radius of 5-point star shape
const STAR_SCORE   = 10;    // points awarded per star

// Score accrual rate multiplied by current tier
const SCORE_RATE   = [0, 1, 1.5, 2.5];   // pts / second at tier 1 / 2 / 3

// Floating "+10" popups: { x, y, age, maxAge }
let scorePopups = [];

// ─── Visual effects ───────────────────────────────────────────────────────────
// Sparkle particles: { x, y, vx, vy, age, maxAge, color }
let particles = [];

// Screen shake
let shakeTimer = 0;
const SHAKE_DUR = 0.30;  // seconds
const SHAKE_MAG = 7;     // max pixel offset

function spawnParticles(cx, cy) {
  const colors = ['#FFD700','#FFF176','#FFB300','#FF8F00','#FFFFFF'];
  for (let i = 0; i < 10; i++) {
    const angle = (i / 10) * Math.PI * 2 + Math.random() * 0.4;
    const speed = 60 + Math.random() * 100;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      age: 0, maxAge: 0.38 + Math.random() * 0.12,
      r: 3 + Math.random() * 3,
      color: colors[Math.floor(Math.random() * colors.length)],
    });
  }
}

function spawnStar() {
  const lane = Math.floor(Math.random() * 3);
  stars.push({ x: LANES[lane], y: -STAR_R });
}

function spawnObstacle() {
  // Pick 1 or 2 lanes to occupy (never all 3 at once)
  const numObs = Math.random() < 0.35 ? 2 : 1;
  const shuffled = [0, 1, 2].sort(() => Math.random() - 0.5).slice(0, numObs);

  for (const lane of shuffled) {
    const isCone = Math.random() < 0.25; // 25% cones, 75% cars
    const w = isCone ? OBS_CONE_W : OBS_CAR_W;
    const h = isCone ? OBS_CONE_H : OBS_CAR_H;
    obstacles.push({
      type:  isCone ? 'cone' : 'car',
      lane,
      y:     -h,                                  // start just above viewport
      x:     LANES[lane],                          // centre X of lane
      w, h,
      color: OBS_COLORS[Math.floor(Math.random() * OBS_COLORS.length)],
    });
  }
}

function hitTest(obs) {
  // Player hitbox (centred on player.x, CAR_Y)
  const px = player.x - HIT_W / 2, py = CAR_Y - HIT_H / 2;
  // Obstacle hitbox (centred on obs.x, obs.y)
  const ox = obs.x - obs.w * 0.7 / 2, oy = obs.y - obs.h * 0.7 / 2;
  return px < ox + obs.w * 0.7 &&
         px + HIT_W > ox       &&
         py < oy + obs.h * 0.7 &&
         py + HIT_H > oy;
}

// ── Bounce animation on hit ──────────────────────────────────────────────────
let bounceTimer = 0;          // seconds remaining for bounce
const BOUNCE_DUR = 0.35;      // total bounce duration

function loseLife() {
  if (invincible > 0) return;   // already invincible
  lives--;
  invincible  = INV_TIME;
  bounceTimer = BOUNCE_DUR;     // trigger bounce
  shakeTimer = SHAKE_DUR;
  sndHit();
  if (lives <= 0) {
    isNewHighScore = Math.floor(score) > highScore;
    if (isNewHighScore) {
      highScore = Math.floor(score);
      localStorage.setItem('rrj_hi', highScore);
    }
    sndGameOver();
    setState(STATE.GAME_OVER);
  }
}

// ─── Game variables ───────────────────────────────────────────────────────────
let score = 0, lives = 3, elapsed = 0;
let highScore      = parseInt(localStorage.getItem('rrj_hi') || '0', 10);
let isNewHighScore = false;

function startGame() {
  score = 0; lives = 3; elapsed = 0;
  tier = 1; roadSpeed = TIER_SPEED[tier];
  roadY = 0; treeY = 0;
  player.x    = GAME_W / 2;
  player.vx   = 0;
  player.tilt = 0;
  obstacles      = [];
  spawnTimer     = 0;
  invincible     = 0;
  bounceTimer    = 0;
  stars          = [];
  starSpawnTimer = 0;
  starNextSpawn  = 4 + Math.random() * 2;
  scorePopups    = [];
  tierBanner     = null;
  isNewHighScore = false;
  particles      = [];
  shakeTimer     = 0;
  setState(STATE.PLAYING);
}

// ─── Game loop ────────────────────────────────────────────────────────────────
let lastTs = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

function update(dt) {
  if (gameState !== STATE.PLAYING) return;
  elapsed += dt;
  score   += dt * SCORE_RATE[tier]; // tier-scaled pts/sec

  // ── Engine audio ─────────────────────────────────────────────────────────
  updateEngine(dt);

  // ── Tier progression ─────────────────────────────────────────────────────
  const nextTier = tier < 3 && elapsed >= TIER_ELAPSED[tier + 1] ? tier + 1 : tier;
  if (nextTier !== tier) {
    tier = nextTier;
    tierBanner = { text: TIER_LABELS[tier], age: 0, maxAge: 2.2 };
    sndTierUp();
  }
  // Smoothly lerp roadSpeed toward the target (reaches ~95% in ~1s)
  roadSpeed += (TIER_SPEED[tier] - roadSpeed) * Math.min(dt * 3, 1);
  // Tier banner countdown
  if (tierBanner) {
    tierBanner.age += dt;
    if (tierBanner.age >= tierBanner.maxAge) tierBanner = null;
  }

  // Scroll road
  roadY = (roadY + roadSpeed * dt) % GAME_H;
  treeY = (treeY + roadSpeed * 0.4 * dt) % GAME_H; // parallax at 40% speed

  // ── Invincibility & bounce countdown ─────────────────────────────────────
  if (invincible   > 0) invincible   = Math.max(0, invincible   - dt);
  if (bounceTimer  > 0) bounceTimer  = Math.max(0, bounceTimer  - dt);

  // ── Obstacle spawning ─────────────────────────────────────────────────────
  spawnTimer += dt;
  const interval = SPAWN_INTERVAL[tier];
  if (spawnTimer >= interval) {
    spawnTimer -= interval;
    spawnObstacle();
  }

  // ── Obstacle movement & collision ─────────────────────────────────────────
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const obs = obstacles[i];
    obs.y += roadSpeed * dt;
    if (obs.y > GAME_H + obs.h) {
      obstacles.splice(i, 1);  // despawn off bottom
      continue;
    }
    if (hitTest(obs)) loseLife();
  }

  // ── Star spawning ────────────────────────────────────────────────────────
  starSpawnTimer += dt;
  if (starSpawnTimer >= starNextSpawn) {
    starSpawnTimer = 0;
    starNextSpawn  = 4 + Math.random() * 2;
    spawnStar();
  }

  // ── Star movement & collection ───────────────────────────────────────────
  for (let i = stars.length - 1; i >= 0; i--) {
    const star = stars[i];
    star.y += roadSpeed * dt;
    if (star.y > GAME_H + STAR_R) { stars.splice(i, 1); continue; }
    // Generous circular pickup radius
    const dx = player.x - star.x, dy = CAR_Y - star.y;
    if (Math.sqrt(dx * dx + dy * dy) < STAR_R + CAR_W * 0.55) {
      score += STAR_SCORE;
      scorePopups.push({ x: star.x, y: star.y, age: 0, maxAge: 0.75 });
      spawnParticles(star.x, star.y);
      sndStar();
      stars.splice(i, 1);
    }
  }

  // ── Score popups countdown ───────────────────────────────────────────────
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].age += dt;
    if (scorePopups[i].age >= scorePopups[i].maxAge) scorePopups.splice(i, 1);
  }

  // ── Particles ────────────────────────────────────────────────────────────
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.age += dt;
    if (p.age >= p.maxAge) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 180 * dt; // gentle gravity
  }

  // ── Screen shake countdown ────────────────────────────────────────────────
  if (shakeTimer > 0) shakeTimer = Math.max(0, shakeTimer - dt);

  // ── Player movement ──────────────────────────────────────────────────────
  const moving = isLeft() || isRight();
  let targetVx = 0;
  if (isLeft())  targetVx = -CAR_SPEED;
  if (isRight()) targetVx =  CAR_SPEED;

  // Smooth acceleration (lerp velocity) for a floaty kid-friendly feel
  player.vx = player.vx + (targetVx - player.vx) * Math.min(dt * 10, 1);

  // Move and clamp to road edges
  player.x = Math.max(ROAD_L + CAR_W / 2,
              Math.min(ROAD_R - CAR_W / 2,
              player.x + player.vx * dt));

  // Tilt proportional to lateral velocity (max ±12°)
  const targetTilt = (player.vx / CAR_SPEED) * (12 * Math.PI / 180);
  player.tilt = player.tilt + (targetTilt - player.tilt) * Math.min(dt * 8, 1);
}

// ─── Auth background (HTML form sits on top) ──────────────────────────────────
function drawAuthScreen() {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#f59e0b';
  ctx.font = 'bold 42px sans-serif';
  ctx.fillText('Road Rush Jr. 🚗', GAME_W / 2, 160);

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '16px sans-serif';
  ctx.fillText('Log in to save your high score', GAME_W / 2, 210);
  ctx.textAlign = 'left';
}

// ─── Draw ─────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, GAME_W, GAME_H);
  if (gameState === STATE.AUTH)      { drawAuthScreen(); return; }
  if (gameState === STATE.START)     { drawStart();      return; }
  if (gameState === STATE.GAME_OVER) { drawGameOver();   return; }

  // Screen shake — offset canvas for hit feedback
  if (shakeTimer > 0) {
    const mag = SHAKE_MAG * (shakeTimer / SHAKE_DUR);
    ctx.save();
    ctx.translate(
      (Math.random() * 2 - 1) * mag,
      (Math.random() * 2 - 1) * mag
    );
  }

  drawRoad();
  drawStars();
  drawObstacles();
  drawPlayer();
  drawParticles();
  drawScorePopups();

  if (shakeTimer > 0) ctx.restore();

  drawHUD();
  drawTouchButtons();
  drawTierBanner();
}

// ─── Obstacle drawing ─────────────────────────────────────────────────────────
function drawObstacles() {
  for (const obs of obstacles) {
    if (obs.type === 'car') drawObstacleCar(obs);
    else                    drawObstacleCone(obs);
  }
}

function drawObstacleCar(obs) {
  const { x, y, w, h, color } = obs;
  ctx.save();
  ctx.translate(x, y);

  const r = 7;
  // Body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(-w/2 + r, -h/2);
  ctx.lineTo( w/2 - r, -h/2);
  ctx.arcTo( w/2, -h/2,  w/2, -h/2 + r, r);
  ctx.lineTo( w/2,  h/2 - r);
  ctx.arcTo( w/2,  h/2,  w/2 - r,  h/2, r);
  ctx.lineTo(-w/2 + r,  h/2);
  ctx.arcTo(-w/2,  h/2, -w/2,  h/2 - r, r);
  ctx.lineTo(-w/2, -h/2 + r);
  ctx.arcTo(-w/2, -h/2, -w/2 + r, -h/2, r);
  ctx.closePath();
  ctx.fill();

  // Windscreen (bottom — facing player)
  ctx.fillStyle = '#b3e5fc';
  ctx.beginPath();
  ctx.roundRect(-w/2 + 6, h/2 - h * 0.32, w - 12, h * 0.26, 4);
  ctx.fill();

  // Wheels
  const wxOff = w/2 + 4, wyFront = -h/2 + 14, wyRear = h/2 - 14;
  ctx.fillStyle = '#222';
  [[-wxOff, wyFront], [wxOff, wyFront], [-wxOff, wyRear], [wxOff, wyRear]].forEach(([wx, wy]) => {
    ctx.beginPath(); ctx.roundRect(wx - 6, wy - 10, 12, 20, 3); ctx.fill();
    ctx.fillStyle = '#aaa';
    ctx.beginPath(); ctx.arc(wx, wy, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#222';
  });

  // Tail-lights
  ctx.fillStyle = '#ff1744';
  ctx.beginPath(); ctx.ellipse(-w/2 + 8, h/2 - 4, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( w/2 - 8, h/2 - 4, 5, 4, 0, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function drawObstacleCone(obs) {
  const { x, y, w, h } = obs;
  ctx.save();
  ctx.translate(x, y);

  // Cone body (triangle)
  ctx.fillStyle = '#FF6D00';
  ctx.beginPath();
  ctx.moveTo(0, -h/2);
  ctx.lineTo( w/2,  h/2);
  ctx.lineTo(-w/2,  h/2);
  ctx.closePath();
  ctx.fill();

  // White stripes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.roundRect(-w/4, -h/2 + h * 0.25, w/2, h * 0.14, 2); ctx.fill();
  ctx.beginPath(); ctx.roundRect(-w/3, -h/2 + h * 0.52, w * 2/3, h * 0.14, 2); ctx.fill();

  // Base
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.roundRect(-w/2, h/2 - 6, w, 6, 2); ctx.fill();

  ctx.restore();
}

// ─── Star drawing ─────────────────────────────────────────────────────────────
function drawStars() {
  for (const star of stars) {
    drawStar5(star.x, star.y, STAR_R);
  }
}

function drawStar5(cx, cy, outerR) {
  const innerR = outerR * 0.42;
  // Soft glow
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, outerR * 1.6);
  grd.addColorStop(0,   'rgba(255,240,100,0.55)');
  grd.addColorStop(1,   'rgba(255,240,100,0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(cx, cy, outerR * 1.6, 0, Math.PI * 2);
  ctx.fill();

  // Star body
  ctx.fillStyle   = '#FFD700';
  ctx.strokeStyle = '#E65100';
  ctx.lineWidth   = 2;
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const angle = (i * Math.PI / 5) - Math.PI / 2;
    const r     = i % 2 === 0 ? outerR : innerR;
    const x     = cx + Math.cos(angle) * r;
    const y     = cy + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(x, y);
    else         ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Sparkle highlight
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.ellipse(cx - outerR * 0.15, cy - outerR * 0.35, outerR * 0.18, outerR * 0.10, -0.5, 0, Math.PI * 2);
  ctx.fill();
}

// ─── Floating score popups ─────────────────────────────────────────────────────
function drawScorePopups() {
  for (const pop of scorePopups) {
    const t     = pop.age / pop.maxAge;            // 0 → 1
    const alpha = 1 - t;
    const y     = pop.y - 50 * t;                  // floats upward 50px
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = '#FFD700';
    ctx.strokeStyle = '#7B3F00';
    ctx.lineWidth   = 3;
    ctx.font        = 'bold 22px sans-serif';
    ctx.textAlign   = 'center';
    ctx.strokeText('+10', pop.x, y);
    ctx.fillText('+10',   pop.x, y);
    ctx.restore();
  }
}

// ─── Player car drawing ───────────────────────────────────────────────────────
function drawPlayer() {
  // Flash during invincibility (hide every other 0.1s)
  if (invincible > 0 && Math.floor(invincible / 0.1) % 2 === 0) return;

  const x = player.x;
  // Bounce: quick upward pop decaying to 0
  const bounceOff = bounceTimer > 0
    ? -18 * Math.sin(bounceTimer / BOUNCE_DUR * Math.PI)
    : 0;
  const y = CAR_Y + bounceOff;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(player.tilt);

  const w = CAR_W, h = CAR_H, r = 8; // body dims & corner radius

  // ── Car body ──
  ctx.fillStyle = player.color;
  ctx.beginPath();
  ctx.moveTo(-w/2 + r, -h/2);
  ctx.lineTo( w/2 - r, -h/2);
  ctx.arcTo(  w/2, -h/2,  w/2, -h/2 + r, r);
  ctx.lineTo( w/2,  h/2 - r);
  ctx.arcTo(  w/2,  h/2, w/2 - r,  h/2, r);
  ctx.lineTo(-w/2 + r,  h/2);
  ctx.arcTo( -w/2,  h/2, -w/2,  h/2 - r, r);
  ctx.lineTo(-w/2, -h/2 + r);
  ctx.arcTo( -w/2, -h/2, -w/2 + r, -h/2, r);
  ctx.closePath();
  ctx.fill();

  // ── Windscreen (front, top of body) ──
  ctx.fillStyle = '#b3e5fc';
  ctx.beginPath();
  ctx.roundRect(-w/2 + 6, -h/2 + 6, w - 12, h * 0.28, 4);
  ctx.fill();

  // ── Rear window ──
  ctx.fillStyle = '#b3e5fc';
  ctx.beginPath();
  ctx.roundRect(-w/2 + 8, h/2 - h * 0.26, w - 16, h * 0.20, 4);
  ctx.fill();

  // ── Wheels (4 corners) ──
  const wxOff = w / 2 + 4, wyFront = -h/2 + 14, wyRear = h/2 - 14;
  ctx.fillStyle = '#222';
  [[-wxOff, wyFront], [wxOff, wyFront], [-wxOff, wyRear], [wxOff, wyRear]].forEach(([wx, wy]) => {
    ctx.beginPath();
    ctx.roundRect(wx - 6, wy - 10, 12, 20, 3);
    ctx.fill();
    // hubcap
    ctx.fillStyle = '#aaa';
    ctx.beginPath();
    ctx.arc(wx, wy, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#222';
  });

  // ── Headlights (top, front) ──
  ctx.fillStyle = '#fffde7';
  ctx.beginPath(); ctx.ellipse(-w/2 + 8, -h/2 + 4, 5, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( w/2 - 8, -h/2 + 4, 5, 4, 0, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// ─── Road drawing ─────────────────────────────────────────────────────────────
function drawRoad() {
  // Grass
  ctx.fillStyle = '#4caf50';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Grass texture stripes (subtle lighter bands)
  ctx.fillStyle = '#56c25a';
  for (let stripe = -GAME_H; stripe < GAME_H * 2; stripe += 60) {
    const y = (stripe + treeY) % (GAME_H + 60) - 60;
    ctx.fillRect(0, y, ROAD_L, 28);
    ctx.fillRect(ROAD_R, y, GAME_W - ROAD_R, 28);
  }

  // Asphalt
  ctx.fillStyle = '#4a4a5a';
  ctx.fillRect(ROAD_L, 0, ROAD_W, GAME_H);

  // Road edge white lines
  ctx.fillStyle = '#fff';
  ctx.fillRect(ROAD_L,     0, 4, GAME_H);
  ctx.fillRect(ROAD_R - 4, 0, 4, GAME_H);

  // Dashed lane dividers
  const DASH_H   = 40;
  const GAP_H    = 30;
  const PERIOD   = DASH_H + GAP_H;
  ctx.fillStyle = '#ffffff99';
  for (let lane = 1; lane <= 2; lane++) {
    const x = ROAD_L + LANE_W * lane - 2;
    for (let d = -PERIOD; d < GAME_H + PERIOD; d += PERIOD) {
      const y = ((d + roadY) % GAME_H + GAME_H) % GAME_H;
      ctx.fillRect(x, y,          4, DASH_H);
      ctx.fillRect(x, y - GAME_H, 4, DASH_H); // wrap-around twin
    }
  }

  // Roadside trees (left & right, parallax)
  drawTrees();
}

function drawTrees() {
  const treeSpacing = 130;
  const treePositions = [
    { x: 22, side: 'left'  },
    { x: 56, side: 'left'  },
    { x: GAME_W - 22, side: 'right' },
    { x: GAME_W - 56, side: 'right' },
  ];
  for (const tp of treePositions) {
    for (let i = -1; i < 3; i++) {
      const y = ((i * treeSpacing + treeY * 1.0 + tp.x * 3) % (treeSpacing * 3) + treeSpacing * 3) % (treeSpacing * 3) - treeSpacing;
      drawTree(tp.x, y);
    }
  }
}

function drawTree(x, y) {
  // Trunk
  ctx.fillStyle = '#7b5230';
  ctx.fillRect(x - 4, y, 8, 22);
  // Canopy
  ctx.fillStyle = '#2e7d32';
  ctx.beginPath();
  ctx.arc(x, y - 2, 18, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#388e3c';
  ctx.beginPath();
  ctx.arc(x - 5, y - 8, 12, 0, Math.PI * 2);
  ctx.fill();
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
function drawHUD() {
  // ── Semi-transparent top bar ──
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, 0, GAME_W, 48);

  // ── Heart lives ──
  const HEART_SIZE = 26;
  const HEART_PAD  = 8;
  for (let i = 0; i < 3; i++) {
    const hx = HEART_PAD + i * (HEART_SIZE + 6) + HEART_SIZE / 2;
    const hy = 24;
    if (i < lives) {
      drawHeart(hx, hy, HEART_SIZE, '#FF3B6E');
    } else {
      drawHeart(hx, hy, HEART_SIZE, '#555');
    }
  }

  // ── Score ──
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(Math.floor(score), GAME_W / 2, 32);

  // ── Speed tier indicator ──
  ctx.fillStyle = '#ffffffaa';
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('Tier ' + tier, GAME_W - 52, 32);

  // ── Mute button ──
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.roundRect(GAME_W - 44, 6, 38, 36, 8); ctx.fill();
  ctx.font = '20px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(muted ? '🔇' : '🔊', GAME_W - 25, 31);

  ctx.textAlign = 'left';
}

function drawHeart(cx, cy, size, color) {
  const s = size / 2;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(cx, cy + s * 0.3);
  // Left bump
  ctx.bezierCurveTo(cx - s * 1.0, cy - s * 0.6,
                    cx - s * 1.0, cy + s * 0.6,
                    cx,           cy + s * 1.1);
  // Right bump
  ctx.bezierCurveTo(cx + s * 1.0, cy + s * 0.6,
                    cx + s * 1.0, cy - s * 0.6,
                    cx,           cy + s * 0.3);
  ctx.fill();
}

// ─── Particle drawing ─────────────────────────────────────────────────────────
function drawParticles() {
  for (const p of particles) {
    const t     = p.age / p.maxAge;
    const alpha = 1 - t;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * (1 - t * 0.5), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// ─── Touch buttons (drawn over everything during gameplay) ───────────────────
function drawTouchButtons() {
  const alpha = 0.45;
  const drawBtn = (x1, x2, label, pressed) => {
    const bx = x1, bw = x2 - x1;
    ctx.save();
    ctx.globalAlpha = pressed ? alpha + 0.25 : alpha;
    ctx.fillStyle = pressed ? 'rgba(255,255,255,0.55)' : 'rgba(0,0,0,0.45)';
    ctx.beginPath(); ctx.roundRect(bx, BTN_Y, bw, BTN_H, 14); ctx.fill();
    // Border
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(bx, BTN_Y, bw, BTN_H, 14); ctx.stroke();
    // Label
    ctx.globalAlpha = pressed ? 1 : 0.85;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, bx + bw / 2, BTN_Y + BTN_H / 2);
    ctx.textBaseline = 'alphabetic';
    ctx.textAlign = 'left';
    ctx.restore();
  };
  drawBtn(BTN_L_X1, BTN_L_X2, '◀', touchLeft);
  drawBtn(BTN_R_X1, BTN_R_X2, '▶', touchRight);
}

// ─── Tier-up banner ───────────────────────────────────────────────────────────
function drawTierBanner() {
  if (!tierBanner) return;
  const t = tierBanner.age / tierBanner.maxAge;       // 0 → 1
  // Fade in over first 20%, hold, fade out over last 30%
  let alpha;
  if (t < 0.2)      alpha = t / 0.2;
  else if (t < 0.7) alpha = 1;
  else               alpha = (1 - t) / 0.3;
  alpha = Math.max(0, Math.min(1, alpha));

  const cy = GAME_H / 2 - 30;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Pill background
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.beginPath();
  ctx.roundRect(GAME_W * 0.12, cy - 30, GAME_W * 0.76, 60, 16);
  ctx.fill();

  // Text
  ctx.fillStyle   = '#FFD700';
  ctx.font        = 'bold 26px sans-serif';
  ctx.textAlign   = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(tierBanner.text, GAME_W / 2, cy);
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign   = 'left';

  ctx.restore();
}

function drawStart() {
  // ── Background gradient ──
  const bg = ctx.createLinearGradient(0, 0, 0, GAME_H);
  bg.addColorStop(0, '#0d1b4b');
  bg.addColorStop(1, '#0a2a1a');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // ── Twinkling dots ──
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  [[38,55],[115,28],[248,75],[382,42],[445,98],[62,175],[205,145],[355,165],[425,218],
   [90,310],[300,290],[450,340],[160,380],[340,420]].forEach(([x,y]) => {
    ctx.beginPath(); ctx.arc(x, y, 1.8, 0, Math.PI * 2); ctx.fill();
  });

  ctx.textAlign = 'center';

  // ── Title ──
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 54px sans-serif';
  ctx.fillText('Road Rush Jr.', GAME_W / 2, 130);

  // ── Best score ──
  if (highScore > 0) {
    ctx.fillStyle = '#ffffffaa';
    ctx.font = '16px sans-serif';
    ctx.fillText('🏆 Best: ' + highScore, GAME_W / 2, 160);
  }

  // ── Animated preview car ──
  const t   = performance.now() / 1000;
  const bob = Math.sin(t * 2.8) * 9;      // gentle bob
  const cx  = GAME_W / 2;
  const cy  = 295 + bob;

  // Road patch under car
  ctx.fillStyle = '#3a3a4a';
  ctx.beginPath(); ctx.roundRect(cx - 55, cy + 40, 110, 18, 5); ctx.fill();
  ctx.fillStyle = '#ffffff55';
  ctx.fillRect(cx - 5, cy + 42, 10, 14); // centre dash

  // Simplified preview car (drawn inline, centred at cx, cy)
  ctx.save();
  ctx.translate(cx, cy);
  const pw = 52, ph = 84, pr = 9;
  ctx.fillStyle = player.color;
  ctx.beginPath();
  ctx.moveTo(-pw/2+pr, -ph/2); ctx.lineTo(pw/2-pr, -ph/2);
  ctx.arcTo(pw/2,-ph/2, pw/2,-ph/2+pr, pr); ctx.lineTo(pw/2, ph/2-pr);
  ctx.arcTo(pw/2, ph/2, pw/2-pr, ph/2, pr); ctx.lineTo(-pw/2+pr, ph/2);
  ctx.arcTo(-pw/2, ph/2,-pw/2, ph/2-pr, pr); ctx.lineTo(-pw/2,-ph/2+pr);
  ctx.arcTo(-pw/2,-ph/2,-pw/2+pr,-ph/2, pr);
  ctx.closePath(); ctx.fill();
  // Windscreen
  ctx.fillStyle = '#b3e5fc';
  ctx.beginPath(); ctx.roundRect(-pw/2+7, -ph/2+7, pw-14, ph*0.28, 5); ctx.fill();
  // Rear window
  ctx.beginPath(); ctx.roundRect(-pw/2+9, ph/2-ph*0.27, pw-18, ph*0.20, 4); ctx.fill();
  // Wheels
  const wxo = pw/2+5;
  [[-wxo,-ph/2+16],[wxo,-ph/2+16],[-wxo,ph/2-16],[wxo,ph/2-16]].forEach(([wx,wy]) => {
    ctx.fillStyle = '#222'; ctx.beginPath(); ctx.roundRect(wx-7,wy-12,14,24,3); ctx.fill();
    ctx.fillStyle = '#aaa'; ctx.beginPath(); ctx.arc(wx,wy,4.5,0,Math.PI*2); ctx.fill();
  });
  // Headlights
  ctx.fillStyle = '#fffde7';
  ctx.beginPath(); ctx.ellipse(-pw/2+9,-ph/2+5,6,4.5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( pw/2-9,-ph/2+5,6,4.5,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // ── PLAY button ──
  const btnW = 200, btnH = 58, btnX = cx - btnW/2, btnY = 430;
  const btnG = ctx.createLinearGradient(btnX, btnY, btnX, btnY+btnH);
  btnG.addColorStop(0, '#43A047'); btnG.addColorStop(1, '#1B5E20');
  ctx.fillStyle = btnG;
  ctx.beginPath(); ctx.roundRect(btnX, btnY, btnW, btnH, 14); ctx.fill();
  ctx.strokeStyle = '#A5D6A7'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(btnX, btnY, btnW, btnH, 14); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 26px sans-serif';
  ctx.fillText('▶  PLAY', cx, btnY + 39);

  // ── Hints ──
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '13px sans-serif';
  ctx.fillText('← → arrow keys to dodge traffic', cx, 518);
  ctx.fillText('SPACE / ENTER also starts the game', cx, 538);

  ctx.textAlign = 'left';
  drawLogoutBtn();
}

function drawGameOver() {
  // ── Background gradient ──
  const bg = ctx.createLinearGradient(0, 0, 0, GAME_H);
  bg.addColorStop(0,   '#2d0a0a');
  bg.addColorStop(0.5, '#1a1a2e');
  bg.addColorStop(1,   '#0a1a2d');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  ctx.textAlign = 'center';

  // ── Heading ──
  ctx.fillStyle = '#FF6B6B';
  ctx.font = 'bold 46px sans-serif';
  ctx.fillText('Game Over! 💥', GAME_W / 2, 195);

  // ── Score ──
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 56px sans-serif';
  ctx.fillText(Math.floor(score), GAME_W / 2, 275);
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = '15px sans-serif';
  ctx.fillText('YOUR SCORE', GAME_W / 2, 300);

  // ── High score ──
  if (isNewHighScore) {
    // Pulsing gold "New Best!"
    const pulse = 0.78 + 0.22 * Math.sin(performance.now() / 180);
    ctx.save();
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 28px sans-serif';
    ctx.fillText('🏆 New Best! 🏆', GAME_W / 2, 348);
    ctx.restore();
  } else {
    ctx.fillStyle = '#aaa';
    ctx.font = '18px sans-serif';
    ctx.fillText('Best: ' + highScore, GAME_W / 2, 348);
  }

  // ── TRY AGAIN button ──
  const btnW = 220, btnH = 58, btnX = GAME_W/2 - btnW/2, btnY = 420;
  const btnG = ctx.createLinearGradient(btnX, btnY, btnX, btnY+btnH);
  btnG.addColorStop(0, '#1565C0'); btnG.addColorStop(1, '#0D47A1');
  ctx.fillStyle = btnG;
  ctx.beginPath(); ctx.roundRect(btnX, btnY, btnW, btnH, 14); ctx.fill();
  ctx.strokeStyle = '#90CAF9'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(btnX, btnY, btnW, btnH, 14); ctx.stroke();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 24px sans-serif';
  ctx.fillText('▶  Try Again', GAME_W / 2, btnY + 38);

  // ── Hint ──
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = '13px sans-serif';
  ctx.fillText('or press SPACE / ENTER', GAME_W / 2, 508);

  ctx.textAlign = 'left';
  drawLogoutBtn();
}

// ─── Kick off ─────────────────────────────────────────────────────────────────
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const { data: profile } = await sb.from('profiles').select('username').eq('id', session.user.id).single();
    currentUser = { id: session.user.id, email: session.user.email, username: profile?.username ?? session.user.email };
    setState(STATE.START);
  } else {
    setState(STATE.AUTH);
    showAuthForm();
  }
  requestAnimationFrame(ts => { lastTs = ts; requestAnimationFrame(loop); });
})();
</script>
